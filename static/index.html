<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <h1>Notes</h1>

  <form id="create-note-form">
    <input type="text" id="note-title" placeholder="Title" required>
    <textarea id="note-content" placeholder="Content"></textarea>
    <button type="submit">Add note</button>
    <p id="create-error" class="error"></p>
  </form>

  <form id="search-form">
    <input type="text" id="search-input" placeholder="Search notes">
    <button type="submit">Search</button>
    <p id="search-error" class="error"></p>
  </form>

  <div id="notes-container">Loading notes...</div>

  <script src="/app.js"></script>
</body>
</html>
